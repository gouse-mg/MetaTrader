<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT5 Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>Connect to MetaTrader 5</h1>
      <p class="hint">Enter the credentials of your MT5 (demo) account. These are the same login/password/server you use in the MT5 terminal.</p>
      <div id="login-error" class="error-box" style="display:none;"></div>
      <label>Login (account number)</label>
      <input id="login-input" type="text" placeholder="e.g. 12345678" autocomplete="off">
      <label>Password</label>
      <input id="password-input" type="password" placeholder="account password" autocomplete="off">
      <label>Server</label>
      <input id="server-input" type="text" placeholder="e.g. MetaQuotes-Demo" autocomplete="off">
      <button id="login-btn">Connect</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard hidden">

    <header class="topbar">
      <div class="brand">MT5 Dashboard</div>
      <div id="account-summary" class="account-summary"></div>
      <button id="disconnect-btn" class="secondary-btn">Disconnect</button>
    </header>

    <main class="main-grid">

      <section class="chart-panel">
        <div class="chart-controls">
          <select id="symbol-select"></select>
          <select id="timeframe-select">
            <option value="M1">M1</option>
            <option value="M5">M5</option>
            <option value="M15" selected>M15</option>
            <option value="M30">M30</option>
            <option value="H1">H1</option>
            <option value="H4">H4</option>
            <option value="D1">D1</option>
          </select>
          <div id="tick-display" class="tick-display">bid: -- / ask: --</div>
        </div>
        <div id="chart" class="chart"></div>
      </section>

      <section class="trade-panel">
        <h2>Place order</h2>
        <label>Volume (lots)</label>
        <input id="volume-input" type="number" step="0.01" value="0.01" min="0.01">
        <label>Stop loss (price, optional)</label>
        <input id="sl-input" type="number" step="0.00001">
        <label>Take profit (price, optional)</label>
        <input id="tp-input" type="number" step="0.00001">
        <div class="trade-buttons">
          <button id="buy-btn" class="buy-btn">Buy</button>
          <button id="sell-btn" class="sell-btn">Sell</button>
        </div>
        <div id="order-message" class="order-message"></div>
      </section>

      <section class="positions-panel">
        <h2>Open positions</h2>
        <table id="positions-table">
          <thead>
            <tr>
              <th>Ticket</th><th>Symbol</th><th>Type</th><th>Volume</th>
              <th>Open price</th><th>Current</th><th>Profit</th><th></th>
            </tr>
          </thead>
          <tbody id="positions-body"></tbody>
        </table>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
